groups:
  - name: contextpilot-observability
    interval: 30s
    rules:
      - alert: ContextPilotHigh5xxRate
        expr: |
          (
            sum(rate(contextpilot_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(contextpilot_http_requests_total[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          service: contextpilot-backend
        annotations:
          summary: "ContextPilot 5xx rate is above 5%"
          description: "The 5xx request ratio has exceeded 5% for 10 minutes."

      - alert: ContextPilotHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(contextpilot_http_request_duration_seconds_bucket[5m]))
          ) > 1.0
        for: 10m
        labels:
          severity: warning
          service: contextpilot-backend
        annotations:
          summary: "ContextPilot p95 latency is above 1 second"
          description: "The p95 HTTP request latency has exceeded 1 second for 10 minutes."

      - alert: ContextPilotAIErrorSpike
        expr: |
          (
            sum(rate(contextpilot_ai_requests_total{status=~"client_error|server_error"}[5m]))
            /
            clamp_min(sum(rate(contextpilot_ai_requests_total[5m])), 0.001)
          ) > 0.20
        for: 10m
        labels:
          severity: warning
          service: contextpilot-backend
        annotations:
          summary: "ContextPilot AI request error ratio is above 20%"
          description: "AI request errors (client/server) have exceeded 20% for 10 minutes."
